aid: firecamp
name: Firecamp
description: >-
  Firecamp is an open-source API development platform for designing, testing,
  and documenting REST, GraphQL, and WebSocket APIs. It provides multi-protocol
  playgrounds (REST, GraphQL, WebSocket, SocketIO), team collaboration in
  shared workspaces, API collection management, a test runner, and CLI/CI-CD
  integration. Firecamp does not expose a public consumer API; it is a tooling
  product for working with other APIs.
